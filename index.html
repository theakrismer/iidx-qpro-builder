<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IIDX Q-Pro Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <h1>IIDX Q-Pro Builder</h1>

    <div class="layout">

      <!-- Preview Window -->
      <div class="preview-panel">
        <div class="preview-window" id="previewWindow">
          <!-- background: z-index 0, offset+scaled -->
          <img class="layer-img layer-background" id="preview-background" src="" alt="" />
          <!-- body: z-index 1 -->
          <img class="layer-img layer-body" id="preview-body" src="" alt="" />
          <!-- hair back: z-index 1 -->
          <img class="layer-img layer-hair-b" id="preview-hair-b" src="" alt="" />
          <!-- head back: z-index 2 -->
          <img class="layer-img layer-head-b" id="preview-head-b" src="" alt="" />
          <!-- hand left: z-index 2 -->
          <img class="layer-img layer-hand-l" id="preview-hand-l" src="" alt="" />
          <!-- hand right: z-index 2 -->
          <img class="layer-img layer-hand-r" id="preview-hand-r" src="" alt="" />
          <!-- face: z-index 2 -->
          <img class="layer-img layer-face" id="preview-face" src="" alt="" />
          <!-- hair front: z-index 3 -->
          <img class="layer-img layer-hair-f" id="preview-hair-f" src="" alt="" />
          <!-- head front: z-index 4 -->
          <img class="layer-img layer-head-f" id="preview-head-f" src="" alt="" />
        </div>

        <div class="preview-actions">
          <button id="exportBtn">⬇ Export JSON</button>
          <button id="importBtn">⬆ Import JSON</button>
          <input type="file" id="importFile" accept=".json" style="display:none;" />
        </div>

        <div class="active-selections" id="activeSelections">
          <!-- Active layer names shown here -->
        </div>
      </div>

      <!-- Layer Panels -->
      <div class="layers-panel" id="layersPanel">
        <!-- Generated by JS -->
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
